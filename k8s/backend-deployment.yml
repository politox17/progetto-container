apiVersion: apps/v1
kind: Deployment
metadata:
  name: prestito
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prestito
  template:
    metadata:
      labels:
        app: prestito
    spec:
      containers:
        - name: prestito
          image: lib-prestito:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres-prestito
            - name: POSTGRES_DB
              value: libreria
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_PASSWORD
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: RABBITMQ_DEFAULT_PASS
            - name: EVENT_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EVENT_EXCHANGE
            - name: CODA_NOTIFICHE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CODA_NOTIFICHE
            - name: PRESTITO_SYNC_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PRESTITO_SYNC_QUEUE
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
