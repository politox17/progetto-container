apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: <TUO_FRONTEND_IMAGE>
          ports:
            - containerPort: 8080
          env:
            - name: BACKEND_URL
              value: "http://backend:5000"
